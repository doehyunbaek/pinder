<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0f172a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>pinder</title>
    <link rel="stylesheet" href="./styles.css?v=20260402-10" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="topbar-main">
          <div class="topbar-copy">
            <p class="eyebrow" id="sourceLabel">arXiv</p>
            <h1>pinder</h1>
            <p class="subhead">Swipe papers like tinder, but for papers.</p>
          </div>

          <div class="topbar-actions">
            <button class="auth-button" id="topAuthButton" type="button">Sign in</button>

            <button
              class="icon-button"
              id="settingsButton"
              type="button"
              aria-label="Open settings"
              aria-controls="settingsMenu"
              aria-expanded="false"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M19.14 12.94c.04-.31.06-.63.06-.94s-.02-.63-.06-.94l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7.03 7.03 0 0 0-1.63-.94l-.36-2.54a.5.5 0 0 0-.49-.42h-3.84a.5.5 0 0 0-.49.42l-.36 2.54c-.58.22-1.13.53-1.63.94l-2.39-.96a.5.5 0 0 0-.6.22L2.68 8.84a.5.5 0 0 0 .12.64l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94L2.8 14.52a.5.5 0 0 0-.12.64l1.92 3.32a.5.5 0 0 0 .6.22l2.39-.96c.5.4 1.05.72 1.63.94l.36 2.54a.5.5 0 0 0 .49.42h3.84a.5.5 0 0 0 .49-.42l.36-2.54c.58-.22 1.13-.53 1.63-.94l2.39.96a.5.5 0 0 0 .6-.22l1.92-3.32a.5.5 0 0 0-.12-.64l-2.03-1.58ZM12 15.5A3.5 3.5 0 1 1 12 8.5a3.5 3.5 0 0 1 0 7Z" />
              </svg>
            </button>

            <div class="settings-menu hidden" id="settingsMenu">
              <p class="settings-title">Settings</p>
              <label class="settings-option" for="showButtonsToggle">
                <input id="showButtonsToggle" type="checkbox" checked />
                <span>Show button controls</span>
              </label>
              <label class="settings-option" for="showAuthorsToggle">
                <input id="showAuthorsToggle" type="checkbox" checked />
                <span>Show authors</span>
              </label>
              <p class="settings-hint">Swipes and arrow keys still work when buttons are hidden.</p>

              <div class="settings-divider"></div>

              <p class="settings-title">Account</p>
              <p class="settings-auth-status" id="authStatus">Checking Google Sheets sync…</p>
              <p class="settings-sync-status" id="syncStatus"></p>
            </div>
          </div>
        </div>

        <div class="progress-panel" aria-hidden="true">
          <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
          </div>
        </div>
      </header>

      <section class="board" aria-live="polite">
        <div class="status-panel hidden" id="statusPanel"></div>

        <div class="card-stack" id="cardStack">
          <article class="paper-card next-card" id="nextCard" aria-hidden="true">
            <p class="next-label">Up next</p>
            <h2 id="nextTitle">Loading…</h2>
            <p id="nextAuthors"></p>
          </article>

          <article class="paper-card current-card" id="currentCard">
            <div class="decision-badge hidden" id="decisionBadge"></div>
            <div class="paper-card-content">
              <div class="paper-links">
                <span class="paper-id" id="paperId"></span>
                <div class="paper-link-actions">
                  <a id="absLink" target="_blank" rel="noreferrer noopener">Open arXiv</a>
                  <a id="pdfLink" target="_blank" rel="noreferrer noopener">PDF</a>
                </div>
              </div>

              <section class="paper-section">
                <p class="section-label">Title</p>
                <h2 id="paperTitle"></h2>
              </section>

              <section class="paper-section" id="authorsSection">
                <p class="section-label">Authors</p>
                <p id="paperAuthors"></p>
              </section>

              <section class="paper-section paper-abstract-section">
                <p class="section-label">Abstract</p>
                <p id="paperAbstract" class="abstract-preview"></p>
              </section>
            </div>
          </article>
        </div>

        <section class="empty-state hidden" id="emptyState">
          <p class="eyebrow">All done</p>
          <h2>You're out of papers.</h2>
          <p id="emptySummary">You reviewed everything in this batch.</p>
          <div class="summary-grid" id="summaryGrid"></div>
        </section>
      </section>

      <section class="action-grid" id="actionGrid" aria-label="Rating buttons">
        <button class="action-button reject" data-decision="reject" type="button">↓ Reject</button>
        <button class="action-button weak-reject" data-decision="weakReject" type="button">← Weak reject</button>
        <button class="action-button weak-accept" data-decision="weakAccept" type="button">→ Weak accept</button>
        <button class="action-button accept" data-decision="accept" type="button">↑ Accept</button>
      </section>

      <footer class="footer-bar">
        <div class="stats" id="stats"></div>
        <div class="footer-actions">
          <button class="secondary-button" id="undoButton" type="button">Undo</button>
          <button class="secondary-button" id="exportButton" type="button">Export reviews</button>
          <button class="secondary-button danger" id="resetButton" type="button">Reset</button>
        </div>
      </footer>
    </main>

    <script src="./google-api-config.js?v=20260402-10"></script>
    <script src="https://accounts.google.com/gsi/client"></script>
    <script src="./scrape.js?v=20260402-10"></script>
    <script src="./auth.js?v=20260402-10"></script>
    <script src="./app.js?v=20260402-10"></script>
  </body>
</html>
